name: Build Arcanus OS Alpha ISO

on:
  push:
    branches:
      - main
    paths:
      - "branding/**"
      - "build/**"
      - "control-centre/**"
      - "docs/**"
      - "rootfs/**"
      - "scripts/**"
      - "theme/**"
      - "Makefile"
      - "makefile"
      - ".github/workflows/build-image.yml"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Verify executable scripts
        run: |
          chmod +x scripts/verify-setup.sh scripts/apply-branding.sh scripts/package-artifact.sh
          chmod +x build/build-iso.sh build/build-locally.sh build/build-docker.sh
          chmod +x control-centre/arcanus-control-centre control-centre/arcanus-welcome

      - name: Validate scaffold
        run: make validate

  build-iso:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 180
    # PRs validate only; ISO build on main push or manual dispatch
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Reclaim ~30GB+ of runner disk space for ISO remaster
      - name: Maximize runner disk space
        run: |
          echo "Before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/share/swift /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL || true
          sudo docker system prune -af || true
          echo "After cleanup:"
          df -h

      - name: Install ISO build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            curl \
            gpg \
            isolinux \
            ripgrep \
            rsync \
            squashfs-tools \
            syslinux-common \
            xorriso

      - name: Cache upstream Linux Mint ISO
        uses: actions/cache@v4
        with:
          path: .cache/iso
          key: mint-iso-${{ hashFiles('build/config/mint-alpha.conf') }}
          restore-keys: |
            mint-iso-

      - name: Build ISO
        run: |
          chmod +x scripts/verify-setup.sh scripts/apply-branding.sh scripts/package-artifact.sh
          chmod +x build/build-iso.sh build/build-locally.sh build/build-docker.sh
          chmod +x control-centre/arcanus-control-centre control-centre/arcanus-welcome
          sudo build/build-iso.sh

      - name: Verify checksum
        run: |
          cd dist
          sha256sum -c ArcanusOS-Alpha-x86_64.iso.sha256
          ls -lh ArcanusOS-Alpha-x86_64.iso ArcanusOS-Alpha-x86_64.iso.sha256
          df -h

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArcanusOS-Alpha-x86_64
          path: |
            dist/ArcanusOS-Alpha-x86_64.iso
            dist/ArcanusOS-Alpha-x86_64.iso.sha256
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      # GitHub Release assets are hard-capped at 2 GiB per file (2147483648 bytes).
      # Our ISO is ~2.7–2.9 GiB, so we publish split parts + sha256 on Releases,
      # and the full unsplit ISO as a workflow Artifact (higher size limit, 14-day retention).
      - name: Create GitHub release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG_NAME="alpha-${{ github.run_number }}"
          RELEASE_TITLE="Arcanus OS Alpha ${{ github.run_number }}"
          ISO="dist/ArcanusOS-Alpha-x86_64.iso"
          SUM="${ISO}.sha256"
          PART_PREFIX="${ISO}.part"

          # 1900 MiB parts stay under the 2 GiB release asset limit with margin
          rm -f "${PART_PREFIX}"*
          split -b 1900M -d -a 2 "$ISO" "$PART_PREFIX"
          ls -lh "$ISO" "$SUM" "${PART_PREFIX}"*

          cat > release-notes.md <<EOF
          Arcanus OS Alpha ISO build from commit \`${{ github.sha }}\`.

          **Base:** Linux Mint 22.3 XFCE (upstream)
          **Output:** \`ArcanusOS-Alpha-x86_64.iso\`

          ## Download options

          ### A) Workflow artifact (full ISO, easiest)
          Open this workflow run → **Artifacts** → **ArcanusOS-Alpha-x86_64** (14-day retention).

          ### B) Release assets (split — GitHub 2 GiB/file limit)
          Download every \`ArcanusOS-Alpha-x86_64.iso.part*\` file plus the \`.sha256\`, then:

          \`\`\`bash
          cat ArcanusOS-Alpha-x86_64.iso.part* > ArcanusOS-Alpha-x86_64.iso
          sha256sum -c ArcanusOS-Alpha-x86_64.iso.sha256
          \`\`\`
          EOF

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release delete "$TAG_NAME" --yes --cleanup-tag || true
          fi

          # shellcheck disable=SC2086
          gh release create "$TAG_NAME" \
            $SUM \
            ${PART_PREFIX}* \
            --title "$RELEASE_TITLE" \
            --notes-file release-notes.md \
            --prerelease
