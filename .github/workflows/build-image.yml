name: Build Arcanus OS Alpha ISO

on:
  push:
    branches:
      - main
    paths:
      - "branding/**"
      - "build/**"
      - "control-centre/**"
      - "docs/**"
      - "scripts/**"
      - "theme/**"
      - "Makefile"
      - ".github/workflows/build-image.yml"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Verify executable scripts
        run: |
          chmod +x scripts/verify-setup.sh scripts/apply-branding.sh scripts/package-artifact.sh
          chmod +x build/build-iso.sh build/build-locally.sh
          chmod +x control-centre/arcanus-control-centre control-centre/arcanus-welcome

      - name: Validate scaffold
        run: make validate

  build-iso:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 150
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Optimization Step: Reclaim ~30GB+ of runner disk space
      - name: Maximize Runner Disk Space
        run: |
          echo "==> Reclaiming disk space from pre-installed software..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          echo "==> Current available storage space:"
          df -h /

      - name: Install ISO build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            curl \
            gpg \
            isolinux \
            ripgrep \
            rsync \
            squashfs-tools \
            syslinux-common \
            xorriso

      - name: Build ISO
        run: |
          chmod +x scripts/verify-setup.sh scripts/apply-branding.sh scripts/package-artifact.sh
          chmod +x build/build-iso.sh build/build-locally.sh
          chmod +x control-centre/arcanus-control-centre control-centre/arcanus-welcome
          sudo build/build-iso.sh

      - name: Verify checksum
        run: |
          cd dist
          sha256sum -c ArcanusOS-Alpha-x86_64.iso.sha256
          ls -lh ArcanusOS-Alpha-x86_64.iso ArcanusOS-Alpha-x86_64.iso.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArcanusOS-Alpha-x86_64
          path: |
            dist/ArcanusOS-Alpha-x86_64.iso
            dist/ArcanusOS-Alpha-x86_64.iso.sha256
          if-no-files-found: error

      # Native GitHub CLI replacement bypasses the 2GB single asset restriction
      - name: Create GitHub release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="alpha-${{ github.run_number }}"
          RELEASE_TITLE="Arcanus OS Alpha ${{ github.run_number }}"
          
          echo "==> Constructing Release notes template..."
          cat <<EOF > release-notes.md
          Arcanus OS Alpha ISO build from commit ${{ github.sha }}.
          Base: Linux Mint XFCE upstream ISO
          Output: ArcanusOS-Alpha-x86_64.iso
          EOF
          
          echo "==> Generating Release target via GitHub CLI..."
          gh release create "$TAG_NAME" \
            --title "$RELEASE_TITLE" \
            --notes-file release-notes.md \
            --prerelease \
            --clobber || true
            
          echo "==> Uploading heavy ISO and manifest assets..."
          gh release upload "$TAG_NAME" \
            dist/ArcanusOS-Alpha-x86_64.iso \
            dist/ArcanusOS-Alpha-x86_64.iso.sha256 \
            --clobber
